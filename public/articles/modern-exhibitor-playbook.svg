<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="A timeline running from planning before a show, through the booth itself, to follow-up results afterwards">
  <rect width="1200" height="400" fill="#ecfdf5" />
  <circle cx="10" cy="400" r="130" fill="#d1fae5" />
  <circle cx="1180" cy="16" r="100" fill="#d1fae5" />

  <!-- The arc through the show and beyond it -->
  <line x1="120" y1="300" x2="1040" y2="300" stroke="#a7f3d0" stroke-width="10" stroke-linecap="round" stroke-dasharray="4 26" />
  <path d="M1044 284 L1082 300 L1044 316 Z" fill="#a7f3d0" />

  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="21" text-anchor="middle">
    <!-- Before: the plan -->
    <rect x="150" y="146" width="170" height="128" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
    <rect x="180" y="178" width="110" height="12" rx="6" fill="#cbd5e1" />
    <rect x="180" y="204" width="86" height="10" rx="5" fill="#e2e8f0" />
    <rect x="180" y="226" width="98" height="10" rx="5" fill="#e2e8f0" />
    <circle cx="235" cy="300" r="16" fill="#34d399" />
    <text x="235" y="356" fill="#0f172a">Before</text>

    <!-- The booth itself -->
    <rect x="486" y="92" width="228" height="34" rx="10" fill="#065f46" />
    <rect x="510" y="134" width="180" height="112" rx="10" fill="#10b981" />
    <rect x="540" y="168" width="120" height="12" rx="6" fill="#ffffff" opacity="0.7" />
    <rect x="540" y="192" width="84" height="10" rx="5" fill="#ffffff" opacity="0.5" />
    <rect x="546" y="246" width="108" height="24" rx="8" fill="#0f172a" />
    <circle cx="600" cy="300" r="20" fill="#10b981" />
    <text x="600" y="356" fill="#0f172a">At the show</text>

    <!-- After: the results -->
    <rect x="880" y="146" width="170" height="128" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
    <rect x="910" y="228" width="26" height="24" rx="5" fill="#a7f3d0" />
    <rect x="952" y="204" width="26" height="48" rx="5" fill="#34d399" />
    <rect x="994" y="176" width="26" height="76" rx="5" fill="#10b981" />
    <circle cx="965" cy="300" r="16" fill="#34d399" />
    <text x="965" y="356" fill="#0f172a">After</text>
  </g>
</svg>
