<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A booth preparation checklist on a clipboard beside countdown markers at 90, 60 and 30 days before the show">
  <rect width="1200" height="630" fill="#d1fae5" />
  <circle cx="-10" cy="660" r="210" fill="#a7f3d0" />
  <circle cx="1215" cy="-25" r="180" fill="#a7f3d0" />
  <circle cx="1128" cy="540" r="20" fill="#fbbf24" />

  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="27" text-anchor="middle">
    <!-- Countdown markers -->
    <rect x="76" y="176" width="222" height="66" rx="33" fill="#6366f1" />
    <text x="187" y="219" fill="#ffffff">90 days</text>
    <rect x="76" y="266" width="222" height="66" rx="33" fill="#f59e0b" />
    <text x="187" y="309" fill="#ffffff">60 days</text>
    <rect x="76" y="356" width="222" height="66" rx="33" fill="#10b981" />
    <text x="187" y="399" fill="#ffffff">30 days</text>
  </g>

  <!-- Clipboard -->
  <rect x="350" y="96" width="452" height="452" rx="28" fill="#065f46" opacity="0.16" transform="translate(0,9)" />
  <rect x="350" y="96" width="452" height="452" rx="28" fill="#ffffff" />
  <rect x="512" y="72" width="128" height="50" rx="16" fill="#0f172a" />

  <g>
    <circle cx="426" cy="196" r="23" fill="#10b981" />
    <path d="M416 196 l7 8 l14 -16" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="470" y="186" width="272" height="19" rx="9.5" fill="#cbd5e1" />

    <circle cx="426" cy="278" r="23" fill="#10b981" />
    <path d="M416 278 l7 8 l14 -16" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="470" y="268" width="226" height="19" rx="9.5" fill="#cbd5e1" />

    <circle cx="426" cy="360" r="23" fill="#10b981" />
    <path d="M416 360 l7 8 l14 -16" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="470" y="350" width="254" height="19" rx="9.5" fill="#cbd5e1" />

    <circle cx="426" cy="442" r="23" fill="#fbbf24" />
    <path d="M426 431 l0 13" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" />
    <circle cx="426" cy="453" r="3.2" fill="#ffffff" />
    <rect x="470" y="432" width="198" height="19" rx="9.5" fill="#e2e8f0" />

    <circle cx="426" cy="524" r="23" fill="#ffffff" stroke="#cbd5e1" stroke-width="5" />
    <rect x="470" y="514" width="164" height="19" rx="9.5" fill="#e2e8f0" />
  </g>

  <!-- The booth being prepared -->
  <rect x="854" y="216" width="232" height="38" rx="13" fill="#065f46" />
  <rect x="882" y="264" width="176" height="128" rx="13" fill="#6ee7b7" />
  <rect x="910" y="304" width="120" height="16" rx="8" fill="#ffffff" opacity="0.9" />
  <rect x="910" y="334" width="84" height="14" rx="7" fill="#ffffff" opacity="0.75" />
  <rect x="916" y="392" width="108" height="30" rx="10" fill="#0f172a" />
</svg>
