<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="A booth preparation checklist on a clipboard beside countdown markers at 90, 60 and 30 days before the show">
  <rect width="1200" height="400" fill="#ecfdf5" />
  <circle cx="10" cy="400" r="130" fill="#d1fae5" />
  <circle cx="1180" cy="16" r="100" fill="#d1fae5" />

  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" text-anchor="middle">
    <!-- Countdown markers -->
    <rect x="96" y="106" width="190" height="54" rx="27" fill="#10b981" />
    <text x="191" y="141" fill="#ffffff">90 days</text>
    <rect x="96" y="176" width="190" height="54" rx="27" fill="#34d399" />
    <text x="191" y="211" fill="#ffffff">60 days</text>
    <rect x="96" y="246" width="190" height="54" rx="27" fill="#6ee7b7" />
    <text x="191" y="281" fill="#065f46">30 days</text>
  </g>

  <!-- Clipboard -->
  <rect x="360" y="52" width="440" height="312" rx="22" fill="#0f172a" opacity="0.06" transform="translate(0,6)" />
  <rect x="360" y="52" width="440" height="312" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
  <rect x="524" y="32" width="112" height="40" rx="12" fill="#0f172a" />

  <g>
    <circle cx="430" cy="128" r="18" fill="#10b981" />
    <path d="M422 128 l6 7 l11 -13" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="466" y="120" width="266" height="15" rx="7.5" fill="#cbd5e1" />

    <circle cx="430" cy="186" r="18" fill="#10b981" />
    <path d="M422 186 l6 7 l11 -13" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="466" y="178" width="220" height="15" rx="7.5" fill="#cbd5e1" />

    <circle cx="430" cy="244" r="18" fill="#10b981" />
    <path d="M422 244 l6 7 l11 -13" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="466" y="236" width="248" height="15" rx="7.5" fill="#cbd5e1" />

    <circle cx="430" cy="302" r="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="4" />
    <rect x="466" y="294" width="188" height="15" rx="7.5" fill="#e2e8f0" />
  </g>

  <!-- The booth being prepared -->
  <rect x="866" y="118" width="204" height="30" rx="10" fill="#065f46" />
  <rect x="888" y="156" width="160" height="102" rx="10" fill="#a7f3d0" />
  <rect x="914" y="188" width="108" height="12" rx="6" fill="#ffffff" opacity="0.85" />
  <rect x="914" y="212" width="76" height="10" rx="5" fill="#ffffff" opacity="0.7" />
  <rect x="920" y="258" width="96" height="24" rx="8" fill="#0f172a" />
</svg>
